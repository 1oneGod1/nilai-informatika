<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru - Input Nilai</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- SheetJS untuk Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="style.css?v=20260315" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 24px 24px;
            color: #cbd5e1;
        }

        .font-mono-tech {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Glassmorphism Dark */
        .glass-panel-teacher {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
        }

        /* Input tabel dark */
        .table-input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            text-align: center;
            width: 100%;
            border-radius: 4px;
            padding: 6px 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .table-input:focus {
            outline: none;
            border-color: #22d3ee;
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
        }
        .input-remedial {
            background: rgba(244, 63, 94, 0.1);
            border-color: rgba(244, 63, 94, 0.35);
            color: #fb7185;
            font-weight: 700;
        }
        .input-remedial:focus {
            border-color: #f43f5e;
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.2);
        }

        /* Quarter Tabs */
        .quarter-tab {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
        }
        .quarter-tab:hover {
            background: rgba(51, 65, 85, 0.8);
            color: #cbd5e1;
        }
        .quarter-tab.active {
            background: rgba(14, 165, 233, 0.2);
            border-color: rgba(14, 165, 233, 0.5);
            color: #38bdf8;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.15);
        }

        /* Alert Animations */
        #alertArea { position: fixed; top: 80px; right: 20px; z-index: 9999; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        .alert { padding: 1rem; border-radius: 0.75rem; display: flex; align-items: center; gap: 0.75rem; background: #fff; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); animation: slideInX 0.3s ease-out forwards; }
        .alert-success { background: #ecfdf5; color: #065f46; border: 1px solid #10b981; }
        .alert-danger { background: #fef2f2; color: #991b1b; border: 1px solid #ef4444; }
        .alert-warning { background: #fffbeb; color: #92400e; border: 1px solid #f59e0b; }
        .alert-info { background: #eff6ff; color: #1e40af; border: 1px solid #3b82f6; }
        @keyframes slideInX { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- NAVBAR Teacher -->
    <nav class="glass-panel-teacher border-b border-slate-700/50 sticky top-0 z-30">
        <div class="max-w-[1400px] mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex flex-wrap items-center gap-4">
                <div class="bg-indigo-500/10 text-indigo-400 p-2.5 rounded-xl border border-indigo-500/20 flex items-center justify-center">
                    <i class="fas fa-server text-sm"></i>
                </div>
                <div class="flex items-center gap-3">
                    <h1 class="text-lg font-bold text-white tracking-wide">Input Nilai Informatika</h1>
                    <span id="roleBadge" class="bg-indigo-500/20 text-indigo-300 text-[10px] font-bold px-3 py-1 rounded-full border border-indigo-500/30 font-mono-tech tracking-widest uppercase hidden sm:inline-flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse"></span> Mode Guru
                    </span>
                    <span id="userNameDisplay" class="text-xs text-slate-400 font-mono-tech hidden sm:inline"></span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <a href="index.html" class="flex items-center gap-2 text-sm font-bold text-slate-300 border border-slate-600 hover:bg-slate-700/50 hover:text-white px-4 py-2 rounded-lg transition-colors font-mono-tech hidden sm:flex">
                    <i class="fas fa-home"></i> Homepage
                </a>
                <button onclick="logoutGuru()" class="flex items-center gap-2 text-sm font-bold text-rose-400 border border-rose-500/30 bg-rose-500/10 hover:bg-rose-500/20 px-4 py-2 rounded-lg transition-colors font-mono-tech">
                    <i class="fas fa-power-off"></i> <span class="hidden sm:inline">Keluar</span>
                </button>
            </div>
        </div>
    </nav>

    <div id="alertArea"></div>

    <div class="flex-1">
        <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-4xl h-[400px] bg-indigo-500/10 blur-[120px] pointer-events-none" style="z-index:0"></div>
        <main class="relative w-full max-w-[1400px] mx-auto px-4 lg:px-6 py-8 flex flex-col gap-6" style="z-index:1">

            <!-- ADMIN PANEL -->
            <div id="adminPanelBtn" class="glass-panel-teacher rounded-2xl overflow-hidden border-l-4 border-l-emerald-500" style="display:none">
                <button class="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-800/60 transition-colors" onclick="this.nextElementSibling.classList.toggle('hidden')">
                    <span class="flex items-center gap-3 text-emerald-400 font-bold text-sm">
                        <i class="fas fa-shield-check"></i> Panel Verifikasi Guru (Admin Utama)
                        <span id="adminBadgeCount" class="bg-rose-500 text-white text-xs px-2 py-0.5 rounded-full" style="display:none">0</span>
                    </span>
                    <i class="fas fa-chevron-down text-slate-500 text-xs"></i>
                </button>
                <div class="hidden border-t border-slate-700/50 relative overflow-hidden bg-slate-900/40">
                    <div id="adminPanelContent" class="relative z-10 p-2"></div>
                </div>
            </div>

            <!-- EXCEL FEATURES -->
            <div class="glass-panel-teacher rounded-2xl p-5 border-l-4 border-l-amber-500 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex items-center gap-2.5 text-amber-400 font-semibold w-full sm:w-auto">
                    <i class="fas fa-file-excel"></i> Fitur Sinkronisasi Data (Excel)
                </div>
                <div class="flex flex-wrap items-center gap-3 w-full sm:w-auto">
                    <button onclick="downloadTemplate()" class="flex-1 sm:flex-none text-xs font-bold text-indigo-400 border border-indigo-500/30 bg-indigo-500/10 hover:bg-indigo-500/20 px-4 py-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-download"></i> Template Excel
                    </button>
                    <button onclick="triggerImport()" class="flex-1 sm:flex-none text-xs font-bold text-amber-400 border border-amber-500/30 bg-amber-500/10 hover:bg-amber-500/20 px-4 py-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-upload"></i> Import Data
                    </button>
                    <input type="file" id="importFileExcel" accept=".xlsx, .xls" class="hidden" onchange="importExcel(event)">
                    <button onclick="exportExcel()" class="flex-1 sm:flex-none text-xs font-bold text-emerald-400 border border-emerald-500/30 bg-emerald-500/10 hover:bg-emerald-500/20 px-4 py-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-file-export"></i> Export Keseluruhan
                    </button>
                </div>
            </div>

            <!-- PENGATURAN KOLOM FORMATIF (Accordion) -->
            <div class="glass-panel-teacher rounded-2xl overflow-hidden border-l-4 border-l-slate-600">
                <button class="w-full flex items-center justify-between px-5 py-4 hover:bg-slate-800/60 transition-colors" onclick="this.nextElementSibling.classList.toggle('hidden')">
                    <span class="flex items-center gap-3 text-slate-300 font-semibold text-sm">
                        <i class="fas fa-cog text-slate-400"></i> Pengaturan Kolom Formatif
                    </span>
                    <i class="fas fa-chevron-down text-slate-500 text-xs"></i>
                </button>
                <div class="hidden border-t border-slate-700/50 px-5 py-5 bg-slate-900/30">
                    <div class="flex items-end gap-4 flex-wrap">
                        <div>
                            <label class="block text-[10px] text-slate-400 font-mono-tech uppercase mb-2">Jumlah Formatif</label>
                            <input type="number" id="numFormatif" value="2" min="1" max="10"
                                class="w-24 bg-slate-900/60 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white font-mono-tech focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
                        </div>
                        <button onclick="applySettings()" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white border border-slate-600 px-4 py-2 rounded-lg text-sm font-semibold transition-colors">
                            <i class="fas fa-check text-emerald-400 text-xs"></i> Terapkan
                        </button>
                    </div>
                </div>
            </div>

            <!-- QUARTER TABS -->
            <div class="glass-panel-teacher rounded-2xl p-3 flex flex-wrap gap-2 items-center justify-center border-l-4 border-l-purple-500">
                <button onclick="setQuarter(1)" id="btnQ1" class="quarter-tab px-6 py-2.5 rounded-xl text-sm font-bold transition-all w-full sm:w-auto"><i class="fas fa-cube mr-1 text-purple-400"></i> Quarter 1</button>
                <button onclick="setQuarter(2)" id="btnQ2" class="quarter-tab px-6 py-2.5 rounded-xl text-sm font-bold transition-all w-full sm:w-auto"><i class="fas fa-cube mr-1 text-purple-400"></i> Quarter 2</button>
                <button onclick="setQuarter(3)" id="btnQ3" class="quarter-tab active px-6 py-2.5 rounded-xl text-sm font-bold transition-all w-full sm:w-auto"><i class="fas fa-cube mr-1 text-purple-400"></i> Quarter 3</button>
                <button onclick="setQuarter(4)" id="btnQ4" class="quarter-tab px-6 py-2.5 rounded-xl text-sm font-bold transition-all w-full sm:w-auto"><i class="fas fa-cube mr-1 text-purple-400"></i> Quarter 4</button>
            </div>

            <!-- TAMBAH SISWA BARU -->
            <div class="glass-panel-teacher rounded-2xl p-6 md:p-8 border-l-4 border-l-cyan-500">
                <div class="flex items-center gap-3 text-white font-bold mb-6 text-lg">
                    <i class="fas fa-user-plus text-cyan-400"></i> Tambah Siswa Baru
                </div>
                <form id="addForm">
                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4 items-end">
                        <div class="col-span-2 lg:col-span-1">
                            <label class="block text-[10px] text-slate-400 font-mono-tech uppercase mb-1.5 ml-0.5">NIS</label>
                            <input type="text" id="nis" required placeholder="0123456789"
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white font-mono-tech focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
                        </div>
                        <div class="col-span-2 lg:col-span-2">
                            <label class="block text-[10px] text-slate-400 font-mono-tech uppercase mb-1.5 ml-0.5">Nama Siswa</label>
                            <input type="text" id="nama" required placeholder="Nama lengkap"
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
                        </div>
                        <div class="col-span-1 lg:col-span-1">
                            <label class="block text-[10px] text-slate-400 font-mono-tech uppercase mb-1.5 ml-0.5">Kelas</label>
                            <input type="text" id="kelas" required placeholder="10 RPL 1"
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white font-mono-tech focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
                        </div>
                        <div class="col-span-1 lg:col-span-1">
                            <label class="block text-[10px] text-slate-400 font-mono-tech uppercase mb-1.5 ml-0.5">Password</label>
                            <input type="text" id="siswaPassword" required placeholder="akses nilai"
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
                        </div>
                        <!-- Formatif dinamis -->
                        <div id="formatifGroupAdd" class="col-span-2 lg:col-span-2 flex gap-2 flex-wrap items-end"></div>
                        <!-- Sumatif -->
                        <div class="col-span-1 lg:col-span-1">
                            <label class="block text-[10px] text-slate-400 font-mono-tech uppercase mb-1.5 text-center">Sumatif</label>
                            <input type="number" id="sumatif" placeholder="0-100" min="0" max="100"
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-2 py-2.5 text-sm text-center text-white font-mono-tech focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500">
                        </div>
                        <!-- Tombol Tambah -->
                        <div class="col-span-2 lg:col-span-1">
                            <button type="submit" onclick="addSiswa(event)"
                                class="w-full bg-slate-800 hover:bg-cyan-600 text-white border border-slate-600 hover:border-cyan-500 py-2.5 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(34,211,238,0.05)] hover:shadow-[0_0_20px_rgba(34,211,238,0.25)]">
                                <i class="fas fa-plus text-xs"></i> Tambah
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- TABEL NILAI SISWA -->
            <div class="glass-panel-teacher rounded-2xl overflow-hidden flex flex-col mb-10 border border-slate-700">
                <!-- Header -->
                <div class="p-6 border-b border-slate-700/50 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-800/30">
                    <div>
                        <h2 class="text-lg font-bold text-white mb-1">Input &amp; Edit Nilai Siswa</h2>
                        <p class="text-xs text-slate-400 font-mono-tech">Menampilkan
                            <span id="shownCount" class="text-cyan-400 font-bold">0</span> dari
                            <span id="totalCount" class="text-white font-bold">0</span> siswa
                        </p>
                    </div>
                    <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                        <div class="relative w-full sm:w-auto">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-filter text-slate-500 text-xs"></i>
                            </div>
                            <select id="filterKelas" onchange="filterTable()"
                                class="w-full appearance-none bg-slate-900/80 border border-slate-700 rounded-lg pl-9 pr-8 py-2 text-sm text-slate-300 focus:outline-none focus:border-cyan-500 cursor-pointer">
                                <option value="">Semua Kelas</option>
                            </select>
                        </div>
                        <div class="relative w-full sm:w-auto flex-1">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-search text-slate-500 text-xs"></i>
                            </div>
                            <input type="text" id="teacherSearch" placeholder="Cari nama..." oninput="filterTable()"
                                class="w-full bg-slate-900/80 border border-slate-700 rounded-lg pl-9 pr-4 py-2 text-sm text-white focus:outline-none focus:border-cyan-500">
                        </div>
                    </div>
                </div>
                <!-- Tabel -->
                <div class="overflow-x-auto">
                    <table class="w-full text-left whitespace-nowrap" id="siswaTable">
                        <thead id="tableHead" class="bg-slate-900/50 text-slate-400 text-[10px] uppercase tracking-widest font-bold"></thead>
                        <tbody id="tableBody" class="divide-y divide-slate-700/50 text-sm">
                            <tr><td colspan="20" class="text-center py-12 text-slate-500">
                                <div class="flex flex-col items-center gap-3">
                                    <i class="fas fa-circle-notch fa-spin text-2xl text-indigo-400"></i>
                                    <span class="text-sm font-mono-tech">Memuat data dari Firebase...</span>
                                </div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-database-compat.js"></script>

    <!-- Custom Scripts -->
    <script src="js/firebase-init.js?v=20260329b"></script>
    <script src="js/auth.js?v=20260329b"></script>
    <!-- teacher.js contains only the logic needed for the dashboard page (auth check, CRUD, admins) -->
    <script src="js/teacher.js?v=20260329b"></script>
</body>
</html>
